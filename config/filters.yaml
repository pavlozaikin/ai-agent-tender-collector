# ============================================================================
#  Prefilter and domain configuration.
#
#  This stage only narrows the PROZORRO firehose cheaply (no LLM cost).
#  It is meant to be wide: it is better to pass an irrelevant tender to the
#  LLM than to silently drop a relevant one. The LLM makes the final
#  relevance decision afterwards.
#
#  A tender is kept if EITHER:
#    - its ДК 021:2015 (CPV) classification code starts with one of a
#      category's cpv_prefixes, OR
#    - its title or any item description contains one of a category's keywords.
#
#  The domain section drives the LLM prompts and report labels.
# ============================================================================

domain:
  name_uk: "автохімія"
  classify_system_uk: |
    Ти класифікатор тендерів для постачальника автохімії. Автохімія охоплює: охолоджувальні рідини та антифризи; гальмівні рідини; рідини для омивача скла; моторні, індустріальні та базові оливи. Визнач, чи закупівля стосується автохімії. Будь точним: супутні товари (паливо, фільтри, запчастини, послуги) не є автохімією. Якщо тендер не стосується автохімії — relevant=false і category='other'.
  report_system_uk: |
    Ти асистент менеджера з продажу автохімії. Напиши стислий опис тендера українською мовою (1-2 речення): що закуповують, обсяг, орієнтовну вартість та строк поставки (якщо вказано). Без вступних фраз, лише суть.
  relevant_field_description: "True only if the tender procures automotive-chemistry products."

categories:
  coolant:
    label_uk: "Охолоджувальні рідини / антифризи"
    cpv_prefixes:
      - "2495"
    keywords:
      - "антифриз"
      - "тосол"
      - "охолоджуюч"
      - "охолоджувальн"
      - "охлаждающ"
      - "етиленгліколь"
      - "пропіленгліколь"
      - "g11"
      - "g12"
      - "g13"

  brake_fluid:
    label_uk: "Гальмівні рідини"
    cpv_prefixes: []
    keywords:
      - "гальмівн"
      - "гальмова рідина"
      - "тормозн"
      - "dot 3"
      - "dot 4"
      - "dot4"
      - "dot 5"

  washer_fluid:
    label_uk: "Рідини для омивача скла"
    cpv_prefixes:
      - "2496"
    keywords:
      - "омивач"
      - "омыват"
      - "склоомивач"
      - "склообмивач"
      - "рідина для скла"

  motor_oil:
    label_uk: "Моторні оливи"
    cpv_prefixes:
      - "0921"
    keywords:
      - "олива"
      - "оливи"
      - "оливу"
      - "мастил"
      - "моторн"
      - "моторное масло"
      - "масло моторн"

  industrial_oil:
    label_uk: "Індустріальні оливи"
    cpv_prefixes: []
    keywords:
      - "індустріальн"
      - "индустриальн"
      - "трансмісійн"
      - "гідравлічн"

  base_oil:
    label_uk: "Базові оливи"
    cpv_prefixes: []
    keywords:
      - "базов олив"

  other:
    label_uk: "Інша автохімія"
    cpv_prefixes: []
    keywords: []
